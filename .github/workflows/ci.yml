name: Java CI with Maven

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          # Crucial for Idea 2: This automatically caches your ~/.m2/repository directory
          cache: 'maven'

      - name: Run Unit & Integration Tests
        run: ./mvnw clean test

      - name: Build with Maven (Generate Jar)
        run: ./mvnw package -DskipTests